spring.application.name=tourism_booking

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/tourism_booking?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=${PORT:8080}

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

jwt.secret=${JWT_SECRET:MySecretKeyForJWTTokenGenerationInTourismBookingSystemPleaseChangeInProduction12345}
jwt.expiration=86400000

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always